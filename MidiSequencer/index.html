                                Open recent <span class="menu-submenu-arrow" aria-hidden="true">▶</span>

                            <div class="menu-submenu-panel" id="open-recent-panel" role="menu" aria-label="Recent songs"></div>
                        </div>
                        <button id="btn-import-midi" title="Import MIDI file">Import…</button>

                        <button id="btn-save-local" title="Save to browser">Save</button>

                        <div class="menu-separator"></div>
                        <button id="btn-edit-copy" title="Copy (Ctrl+C)">Copy <span class="menu-shortcut">Ctrl+C</span></button>
                        <button id="btn-edit-paste" title="Paste (Ctrl+V)">Paste <span class="menu-shortcut">Ctrl+V</span></button>
                        <button id="btn-edit-select-all" title="Select All (Ctrl+A)">Select All <span class="menu-shortcut">Ctrl+A</span></button>
                        <div class="menu-separator"></div>
                        <button id="btn-edit-delete" title="Delete (Del)">Delete <span class="menu-shortcut">Del</span></button>

                        </button>
                        <div class="menu-separator"></div>
                        <button type="button" id="btn-view-vertical-roll" title="Pitch along the bottom, time upward; playhead on the keyboard edge">

                        </button>
                        <div class="menu-submenu" id="menu-key-signature-wrap">

                        </div>
                        <div class="menu-separator"></div>

                        <button type="button" id="btn-view-zoom-fit" title="Zoom out until the whole timeline fits (or minimum zoom if the song is very long)">Zoom to fit</button>
                    </div>
                </div>

                    <div class="dropdown-content" id="insert-dropdown">

    <script type="module">
        import { WorkletSynthesizer, WorkerSynthesizer } from 'https://cdn.jsdelivr.net/npm/spessasynth_lib@4.2.2/dist/index.js';
        window.SpessaSynthWorkletSynthesizer = WorkletSynthesizer;
        window.__spessaWorkerSynthInstaller = {
            WorkerSynthesizer,
            workerModuleURL: new URL('spessasynth-audio-worker.js', import.meta.url).href
        };

        // Bundled default (same folder as index.html) loads on http(s). Optional extras: release page + file picker.
        const SOUNDFONT_RELEASE_PAGE =
            'https://github.com/durnurd/pulse-pro-midi-sequencer/releases/tag/soundfonts';
        const DEFAULT_SOUNDFONT_FILE = 'GeneralUser GS v1.47.sf2';
        const DEFAULT_SOUNDFONT_LABEL = 'GeneralUser GS v1.47';
        const VALUE_LOAD_FILE = '__pulsepro_load_sf2__';
        const VALUE_GET_SOUNDFONTS = '__pulsepro_get_soundfonts__';

        const select = document.getElementById('soundfont-select');
        let lastLoadedSoundFontId = null;

        function ensureActionsOptgroup() {
            if (select.querySelector('optgroup[data-pulsepro-actions]')) return;
            const og = document.createElement('optgroup');
            og.label = 'More';
            og.setAttribute('data-pulsepro-actions', '1');
            const optLoad = document.createElement('option');
            optLoad.value = VALUE_LOAD_FILE;
            optLoad.textContent = 'Load .sf2 from device…';
            const optGet = document.createElement('option');
            optGet.value = VALUE_GET_SOUNDFONTS;
            optGet.textContent = 'Get soundfonts (new tab)…';
            og.appendChild(optLoad);
            og.appendChild(optGet);
            select.appendChild(og);
        }

        function resetSelectToLastLoadedFont() {
            if (lastLoadedSoundFontId && [...select.options].some((o) => o.value === lastLoadedSoundFontId)) {
                select.value = lastLoadedSoundFontId;
                return;
            }
            const ph = select.querySelector('option[data-pulsepro-placeholder]');
            if (ph) {
                ph.selected = true;
                return;
            }
            if (select.options.length) select.selectedIndex = 0;
        }

        function appendNoSoundFontPlaceholder() {
            const placeholderOpt = document.createElement('option');
            placeholderOpt.value = '';
            placeholderOpt.textContent = '(no SoundFont loaded)';
            placeholderOpt.disabled = true;
            placeholderOpt.selected = true;
            placeholderOpt.setAttribute('data-pulsepro-placeholder', '1');
            select.appendChild(placeholderOpt);
            ensureActionsOptgroup();
        }

        function openSoundFontFilePicker() {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = '.sf2,.sf3,.dls';
            inp.addEventListener('change', async () => {
                if (!inp.files || !inp.files[0]) return;
                const file = inp.files[0];
                const id = file.name;
                if (audioEngine._loadedSoundFonts.has(id)) {
                    lastLoadedSoundFontId = id;
                    select.value = id;
                    await audioEngine.switchSoundFont(id);
                    return;
                }
                const buffer = await file.arrayBuffer();
                const ok = await audioEngine.loadSoundFontFromBuffer(buffer, id);
                if (!ok) return;
                lastLoadedSoundFontId = id;
                const og = select.querySelector('optgroup[data-pulsepro-actions]');
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                if (og) select.insertBefore(opt, og);
                else select.appendChild(opt);
                select.value = id;
            });
            inp.addEventListener('cancel', () => resetSelectToLastLoadedFont());
            inp.click();
        }

        select.addEventListener('change', async () => {
            const v = select.value;
            if (v === VALUE_LOAD_FILE) {
                resetSelectToLastLoadedFont();
                openSoundFontFilePicker();
                return;
            }
            if (v === VALUE_GET_SOUNDFONTS) {
                window.open(SOUNDFONT_RELEASE_PAGE, '_blank', 'noopener,noreferrer');
                resetSelectToLastLoadedFont();
                return;
            }
            if (v) {
                await audioEngine.switchSoundFont(v);
                lastLoadedSoundFontId = v;
            }
        });

        async function setupBundledDefaultSoundFont() {
            select.innerHTML = '';
            if (location.protocol === 'file:') {
                appendNoSoundFontPlaceholder();
                return true;
            }
            const loadingOpt = document.createElement('option');
            loadingOpt.value = '';
            loadingOpt.textContent = 'Loading soundfont…';
            loadingOpt.disabled = true;
            loadingOpt.selected = true;
            select.appendChild(loadingOpt);

            const url = new URL(DEFAULT_SOUNDFONT_FILE, location.href).href;
            const id = url;
            const ok = await audioEngine.loadSoundFont(url, id);
            select.innerHTML = '';
            if (ok) {
                lastLoadedSoundFontId = id;
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = DEFAULT_SOUNDFONT_LABEL;
                opt.selected = true;
                select.appendChild(opt);
                ensureActionsOptgroup();
                return true;
            }
            appendNoSoundFontPlaceholder();
            return false;
        }

        function armBundledSoundFontAfterUserGesture() {
            select.innerHTML = '';
            const hint = document.createElement('option');
            hint.value = '';
            hint.textContent = 'Click or tap anywhere to retry audio…';
            hint.disabled = true;
            hint.selected = true;
            select.appendChild(hint);

            const start = () => {
                document.removeEventListener('pointerdown', start, true);
                document.removeEventListener('keydown', start, true);
                void (async () => {
                    const ok = await setupBundledDefaultSoundFont();
                    if (!ok) armBundledSoundFontAfterUserGesture();
                })();
            };
            document.addEventListener('pointerdown', start, true);
            document.addEventListener('keydown', start, true);
        }

        void (async () => {
            const ok = await setupBundledDefaultSoundFont();
            if (!ok && location.protocol !== 'file:') {
                armBundledSoundFontAfterUserGesture();
            }
        })();
    </script>
</body>
</html>
